<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sprint 2 · MoH · Junon Research Notes</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css">
  <style>
    :root {
      --paper:#ffffff; --ink:#1a1a1f; --muted:#6b7280; --faint:#9ca3af;
      --hair:#e8e8ec;
      --accent:#2545a6; --accent-soft:#eef1fb;
      --next:#0f766e;  --next-bg:#eafaf6;
      --recap-bg:#f5f6f8;
      --maxw:900px;
      --sans:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Noto Sans KR",sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); line-height:1.65; }
    a { color:inherit; text-decoration:none; }
    .page { width:min(100% - 32px, var(--maxw)); margin:0 auto; padding:56px 0 40px; }
    .breadcrumb { margin:0 0 28px; color:var(--muted); font-size:14px; }
    .breadcrumb a { color:var(--accent); }
    .breadcrumb a:hover { text-decoration:underline; }
    .site-header { padding-bottom:34px; border-bottom:1px solid var(--hair); }
    .eyebrow { margin:0 0 8px; color:var(--accent); font-size:13px; font-weight:700; text-transform:uppercase; }
    h1 { margin:0; font-size:clamp(26px,5vw,42px); line-height:1.1; font-weight:800; }
    .subtitle { margin:14px 0 0; color:var(--muted); font-size:17px; }
    main { padding:42px 0; }
    .section-head { display:flex; align-items:end; justify-content:space-between; gap:16px; margin-bottom:16px; }
    h2 { margin:0; font-size:20px; font-weight:700; }
    .count { color:var(--faint); font-size:14px; }
    .paper-list { display:grid; gap:12px; }
    .paper-item {
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding:18px 20px; border:1px solid var(--hair); border-radius:8px;
      background:var(--paper); transition:background-color 150ms ease, color 150ms ease;
    }
    .paper-item:hover { background:var(--accent-soft); color:var(--accent); }
    .paper-item-left { display:flex; align-items:center; gap:14px; }
    .paper-num {
      display:flex; align-items:center; justify-content:center;
      width:32px; height:32px; border-radius:50%;
      background:var(--recap-bg); color:var(--muted);
      font-size:13px; font-weight:700; flex-shrink:0;
    }
    .paper-item h3 { margin:0; font-size:16px; font-weight:650; line-height:1.35; }
    .paper-item .note-tag {
      display:inline-flex; align-items:center; padding:2px 8px;
      border-radius:999px; background:var(--next-bg); color:var(--next);
      font-size:11px; font-weight:700; margin-top:4px;
    }
    .paper-item .arrow { color:var(--faint); font-size:20px; flex-shrink:0; }
    .paper-item:hover .arrow { color:var(--accent); }
    .empty-state {
      padding:48px 24px; border:1px dashed var(--hair); border-radius:8px;
      text-align:center; color:var(--faint); font-size:15px;
    }
    .site-footer { display:flex; justify-content:space-between; gap:16px; padding-top:22px; border-top:1px solid var(--hair); color:var(--muted); font-size:14px; margin-top:40px; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="breadcrumb">
      <a href="../../index.html">Home</a> / <a href="../index.html">Papers</a> / Sprint 2
    </nav>
    <header class="site-header">
      <p class="eyebrow">Sprint 2</p>
      <h1>MoH</h1>
      <p class="subtitle">Mixture of Heads 관련 논문 분석</p>
    </header>

    <main>
      <div class="section-head">
        <h2>논문 목록</h2>
        <span class="count">0 papers</span>
      </div>
      <div class="paper-list">
        <div class="empty-state">아직 추가된 논문이 없습니다.</div>
      </div>
    </main>

    <footer class="site-footer">
      <span>Junon · Research Note Hub</span>
      <span>Last updated 2026-06-17</span>
    </footer>
  </div>
</body>
</html>
