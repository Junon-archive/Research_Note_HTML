<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Papers · Junon Research Notes</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css">
  <style>
    :root {
      --paper:#ffffff; --ink:#1a1a1f; --muted:#6b7280; --faint:#9ca3af;
      --hair:#e8e8ec; --hair-strong:#d6d6db;
      --accent:#2545a6; --accent-soft:#eef1fb;
      --next:#0f766e;  --next-bg:#eafaf6;
      --recap:#57606a; --recap-bg:#f5f6f8;
      --maxw:900px;
      --sans:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Noto Sans KR",sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); line-height:1.65; }
    a { color:inherit; text-decoration:none; }
    .page { width:min(100% - 32px, var(--maxw)); margin:0 auto; padding:56px 0 40px; }
    .breadcrumb { margin:0 0 28px; color:var(--muted); font-size:14px; }
    .breadcrumb a { color:var(--accent); }
    .breadcrumb a:hover { text-decoration:underline; }
    .site-header { padding-bottom:34px; border-bottom:1px solid var(--hair); }
    .eyebrow { margin:0 0 8px; color:var(--accent); font-size:13px; font-weight:700; text-transform:uppercase; }
    h1 { margin:0; font-size:clamp(28px,5vw,44px); line-height:1.1; font-weight:800; }
    .subtitle { margin:14px 0 0; color:var(--muted); font-size:17px; }
    main { display:grid; gap:28px; padding:42px 0; }
    .sprint-grid { display:grid; gap:16px; }
    .sprint-card {
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding:20px 22px; border:1px solid var(--hair); border-radius:8px;
      background:var(--paper); transition:background-color 150ms ease, color 150ms ease;
    }
    .sprint-card:hover { background:var(--accent-soft); color:var(--accent); }
    .sprint-card-left { display:flex; align-items:center; gap:16px; }
    .sprint-badge {
      display:inline-flex; align-items:center; padding:4px 12px;
      border-radius:999px; background:var(--next-bg); color:var(--next);
      font-size:12px; font-weight:700; white-space:nowrap;
    }
    .sprint-card h2 { margin:0; font-size:19px; font-weight:700; }
    .sprint-card .desc { margin:4px 0 0; color:var(--muted); font-size:14px; }
    .sprint-card .arrow { color:var(--faint); font-size:20px; }
    .sprint-card:hover .arrow { color:var(--accent); }
    .site-footer { display:flex; justify-content:space-between; gap:16px; padding-top:22px; border-top:1px solid var(--hair); color:var(--muted); font-size:14px; }
    @media (max-width:600px) {
      .sprint-card { flex-direction:column; align-items:flex-start; }
      .sprint-card-left { flex-direction:column; align-items:flex-start; gap:10px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="breadcrumb">
      <a href="../index.html">Home</a> / Papers
    </nav>
    <header class="site-header">
      <p class="eyebrow">Papers</p>
      <h1>논문 리뷰</h1>
      <p class="subtitle">스프린트 단위로 정리된 논문 분석 자료</p>
    </header>

    <main>
      <div class="sprint-grid">
        <a class="sprint-card" href="Sprint1_Accel-sim/index.html">
          <div class="sprint-card-left">
            <span class="sprint-badge">Sprint 1</span>
            <div>
              <h2>Accel-sim</h2>
              <p class="desc">GPU 시뮬레이션 프레임워크 및 관련 논문 분석</p>
            </div>
          </div>
          <span class="arrow">›</span>
        </a>
        <a class="sprint-card" href="Sprint2_MoH/index.html">
          <div class="sprint-card-left">
            <span class="sprint-badge">Sprint 2</span>
            <div>
              <h2>MoH</h2>
              <p class="desc">Mixture of Heads 관련 논문 분석</p>
            </div>
          </div>
          <span class="arrow">›</span>
        </a>
        <a class="sprint-card" href="Sprint3_HVRP/index.html">
          <div class="sprint-card-left">
            <span class="sprint-badge">Sprint 3</span>
            <div>
              <h2>HVRP</h2>
              <p class="desc">HVRP 관련 논문 분석</p>
            </div>
          </div>
          <span class="arrow">›</span>
        </a>
      </div>
    </main>

    <footer class="site-footer">
      <span>Junon · Research Note Hub</span>
      <span>Last updated 2026-06-17</span>
    </footer>
  </div>
</body>
</html>
